<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level UP - مركز المساعدة والدعم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #16181f;
            --text-color: #e0e6ed;
            --text-muted: #8b949e;
            --accent-color: #0070cc; /* PS Blue */
            --accent-hover: #005cba;
            --border-color: #232630;
            --note-bg: rgba(255, 69, 58, 0.1);
            --note-border: #ff453a;
            --transition-speed: 0.4s;
        }

        /* PS5 Theme Colors */
        body.theme-ps5 {
            --bg-color: #f2f5f9;
            --panel-bg: #ffffff;
            --text-color: #111418;
            --text-muted: #5c6773;
            --accent-color: #111418; /* PS5 Minimalist Black */
            --accent-hover: #333333;
            --border-color: #d1d6e0;
            --note-bg: rgba(255, 69, 58, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header & Logo */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(0, 112, 204, 0.4);
            transition: color var(--transition-speed) ease, text-shadow var(--transition-speed) ease;
        }

        body.theme-ps5 h1 {
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        /* Controls: Language and Console */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button.toggle-btn {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button.toggle-btn:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        button.toggle-btn.active-ps4 {
            background-color: #0070cc;
            color: white;
            border-color: #0070cc;
            box-shadow: 0 0 15px rgba(0, 112, 204, 0.5);
        }

        button.toggle-btn.active-ps5 {
            background-color: #111418;
            color: white;
            border-color: #111418;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /* FAQ Accordion */
        .faq-item {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all var(--transition-speed) ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .faq-item:hover {
            border-color: var(--accent-color);
        }

        .faq-btn {
            width: 100%;
            text-align: right;
            padding: 25px;
            font-size: 1.3rem;
            font-weight: 700;
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.3s ease;
        }

        body[dir="ltr"] .faq-btn {
            text-align: left;
        }

        .faq-btn:hover {
            color: var(--accent-color);
        }

        .faq-icon {
            font-size: 1rem;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--accent-color);
        }

        .faq-item.open .faq-icon {
            transform: rotate(180deg);
        }

        .faq-content {
            max-height: 0;
            opacity: 0;
            padding: 0 25px;
            visibility: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.4s ease, 
                        padding 0.4s ease,
                        visibility 0.5s;
        }

        .faq-item.open .faq-content {
            padding: 0 25px 25px 25px;
            opacity: 1;
            visibility: visible;
        }

        .faq-content ol {
            margin-inline-start: 25px;
            margin-bottom: 25px;
            color: var(--text-muted);
        }

        .faq-content li {
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .faq-content li strong {
            color: var(--text-color);
        }

        /* Important Note */
        .important-note {
            background-color: var(--note-bg);
            border-right: 4px solid var(--note-border);
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: 700;
            color: #ff453a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        body[dir="ltr"] .important-note {
            border-right: none;
            border-left: 4px solid var(--note-border);
        }

        /* Images Grid */
        .faq-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .faq-images img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .faq-images img:hover {
            transform: scale(1.03);
            border-color: var(--accent-color);
        }
        
        .fade-out {
            opacity: 0;
            transform: translateY(10px);
        }
        .fade-in {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

    </style>
</head>

                ps4: {
                    steps: {
                        ar: ['اذهب إلى <strong>(الإعدادات)</strong>.', 'اختر <strong>(الصوت والشاشة)</strong>.', 'اختر <strong>(إعدادات إخراج الفيديو)</strong> لضبط الدقة (Resolution) والـ HDR.'],

                ps5: {
                    steps: {
                        ar: ['اذهب إلى <strong>(الإعدادات)</strong>.', 'اختر <strong>(الشاشة والفيديو)</strong>.', 'اختر <strong>(إخراج الفيديو)</strong> لضبط 4K، VRR، 120Hz، و HDR.']

        // المتغيرات لحفظ الحالة (لغة وجهاز)
        let currentLang = 'ar';
        let currentConsole = 'ps4';

        const container = document.getElementById('faqContainer');
        const langBtn = document.getElementById('langBtn');
        const consoleBtn = document.getElementById('consoleBtn');
        const title = document.getElementById('pageTitle');

        function renderFAQ() {
            // عمل Fade Out
            container.classList.remove('fade-in');
            container.classList.add('fade-out');
            
            setTimeout(() => {
                container.innerHTML = '';
                faqData.forEach((item, index) => {
                    const data = item[currentConsole];
                    const steps = data.steps[currentLang];
                    const images = data.images || [];

                    const faqItem = document.createElement('div');
                    faqItem.className = 'faq-item';

                    // إنشاء النوت (إن وجدت)
                    const noteHtml = item.note ? `<div class="important-note">⚠️ ${item.note[currentLang]}</div>` : '';

                    // إنشاء الصور (فقط لو PS4 ويوجد صور)
                    const imagesHtml = (currentConsole === 'ps4' && images.length > 0) 
                        ? `<div class="faq-images">${images.map(img => `<img src="${img}" alt="خطوات ${currentConsole}" loading="lazy">`).join('')}</div>`
                        : '';

                    faqItem.innerHTML = `
                        <button class="faq-btn" onclick="toggleAccordion(this)">
                            <span>${item.title[currentLang]}</span>
                            <span class="faq-icon">▼</span>
                        </button>
                        <div class="faq-content">
                            ${noteHtml}
                            <ol>
                                ${steps.map(step => `<li>${step}</li>`).join('')}
                            </ol>
                            ${imagesHtml}
                        </div>
                    `;
                    container.appendChild(faqItem);
                });
                
                // عمل Fade In
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
            }, 400); // يتطابق مع سرعة الـ Transition
        }

        function toggleAccordion(btnElement) {
            const item = btnElement.parentElement;
            const content = item.querySelector('.faq-content');
            
            // إغلاق أي بانل مفتوح غير اللي ضغطنا عليه
            document.querySelectorAll('.faq-item').forEach(el => {
                if(el !== item && el.classList.contains('open')) {
                    el.classList.remove('open');
                    el.querySelector('.faq-content').style.maxHeight = null;
                }
            });

            // فتح أو إغلاق الحالي
            if (item.classList.contains('open')) {
                item.classList.remove('open');
                content.style.maxHeight = null;
            } else {
                item.classList.add('open');
                // نجمع ارتفاع المحتوى الداخلي بالكامل
                content.style.maxHeight = content.scrollHeight + 100 + "px"; 
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            // تحديث النصوص
            langBtn.innerHTML = currentLang === 'ar' ? '🌐 English' : '🌐 عربي';
            updateConsoleBtnText();
            
            renderFAQ();
        }

        function toggleConsole() {
            if(currentConsole === 'ps4') {
                currentConsole = 'ps5';
                document.body.classList.add('theme-ps5');
                consoleBtn.classList.remove('active-ps4');
                consoleBtn.classList.add('active-ps5');
            } else {
                currentConsole = 'ps4';
                document.body.classList.remove('theme-ps5');
                consoleBtn.classList.remove('active-ps5');
                consoleBtn.classList.add('active-ps4');
            }
            
            updateConsoleBtnText();
            renderFAQ();
        }

        function updateConsoleBtnText() {
            if (currentConsole === 'ps4') {
                consoleBtn.innerHTML = currentLang === 'ar' ? '🎮 التبديل لـ PS5' : '🎮 Switch to PS5';
            } else {
                consoleBtn.innerHTML = currentLang === 'ar' ? '🎮 التبديل لـ PS4' : '🎮 Switch to PS4';
            }
        }

        // تشغيل الريندر لأول مرة عند فتح الصفحة
        renderFAQ();
    </script>

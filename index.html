<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level UP - مركز المساعدة والدعم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #16181f;
            --text-color: #e0e6ed;
            --text-muted: #8b949e;
            --accent-color: #0070cc;
            --accent-hover: #005cba;
            --border-color: #232630;
            --note-bg: rgba(255, 69, 58, 0.1);
            --note-border: #ff453a;
            --transition-speed: 0.4s;
        }

        body.theme-ps5 {
            --bg-color: #f2f5f9;
            --panel-bg: #ffffff;
            --text-color: #111418;
            --text-muted: #5c6773;
            --accent-color: #111418;
            --accent-hover: #333333;
            --border-color: #d1d6e0;
            --note-bg: rgba(255, 69, 58, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(0, 112, 204, 0.4);
            transition: color var(--transition-speed) ease, text-shadow var(--transition-speed) ease;
        }

        body.theme-ps5 h1 {
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        #activeConsoleBadge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 30px;
            transition: all var(--transition-speed) ease;
            letter-spacing: 1px;
            gap: 10px;
        }

        .badge-ps4 {
            background-color: rgba(0, 112, 204, 0.15);
            color: #00a2ff;
            border: 2px solid #0070cc;
            box-shadow: 0 0 15px rgba(0, 112, 204, 0.4);
        }

        .badge-ps5 {
            background-color: #111418;
            color: #ffffff;
            border: 2px solid #111418;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button.toggle-btn {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button.toggle-btn:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .faq-item {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all var(--transition-speed) ease;
        }

        .faq-item:hover {
            border-color: var(--accent-color);
        }

        .faq-btn {
            width: 100%;
            text-align: right;
            padding: 20px 25px;
            font-size: 1.2rem;
            font-weight: 700;
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        body[dir="ltr"] .faq-btn {
            text-align: left;
        }

        .faq-btn:hover {
            color: var(--accent-color);
            background-color: rgba(0, 112, 204, 0.02);
        }

        .faq-icon {
            font-size: 1rem;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--accent-color);
        }

        .faq-item.open .faq-icon {
            transform: rotate(180deg);
        }

        .faq-content {
            max-height: 0;
            opacity: 0;
            padding: 0 25px;
            visibility: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.3s ease, 
                        padding 0.3s ease,
                        visibility 0.4s;
        }

        .faq-item.open .faq-content {
            padding: 0 25px 25px 25px;
            opacity: 1;
            visibility: visible;
        }

        .faq-content ol {
            margin-inline-start: 25px;
            color: var(--text-muted);
        }

        .faq-content li {
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.7;
        }

        .faq-content li strong {
            color: var(--text-color);
        }

        .important-note {
            background-color: var(--note-bg);
            border-right: 4px solid var(--note-border);
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: 700;
            color: #ff453a;
        }
        
        body[dir="ltr"] .important-note {
            border-right: none;
            border-left: 4px solid var(--note-border);
        }
        
        .fade-out { opacity: 0; transform: translateY(10px); }
        .fade-in { opacity: 1; transform: translateY(0); transition: opacity 0.3s ease, transform 0.3s ease; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="pageTitle">Level UP Support</h1>
            
            <div id="activeConsoleBadge" class="badge-ps4">
                <span id="badgeIcon">🎮</span> 
                <span id="badgeText">الجهاز الحالي: PS4</span>
            </div>
            
            <div class="controls">
                <button id="langBtn" class="toggle-btn" onclick="toggleLanguage()">🌐 English</button>
                <button id="consoleBtn" class="toggle-btn" onclick="toggleConsole()">التبديل إلى PS5 🔄</button>
            </div>
        </header>

        <main id="faqContainer" class="fade-in">
            </main>
    </div>

        let currentLang = 'ar';

        const container = document.getElementById('faqContainer');
        const langBtn = document.getElementById('langBtn');

        const badgeText = document.getElementById('badgeText');
        const badgeElement = document.getElementById('activeConsoleBadge');

        function renderFAQ() {
            container.classList.remove('fade-in');
            container.classList.add('fade-out');
            
            setTimeout(() => {
                container.innerHTML = '';
                faqData.forEach((item) => {
                    const data = item[currentConsole];
                    const steps = data.steps[currentLang];

                    const faqItem = document.createElement('div');
                    faqItem.className = 'faq-item';

                    const noteHtml = item.note ? `<div class="important-note">⚠️ ${item.note[currentLang]}</div>` : '';

                    faqItem.innerHTML = `
                        <button class="faq-btn" onclick="toggleAccordion(this)">
                            <span>${item.title[currentLang]}</span>
                            <span class="faq-icon">▼</span>
                        </button>
                        <div class="faq-content">
                            ${noteHtml}
                            <ol>
                                ${steps.map(step => `<li>${step}</li>`).join('')}
                            </ol>
                        </div>
                    `;
                    container.appendChild(faqItem);
                });
                
                container.classList.remove('fade-out');
                container.classList.add('fade-in');
            }, 300); 
        }

        function toggleAccordion(btnElement) {
            const item = btnElement.parentElement;
            const content = item.querySelector('.faq-content');
            
            document.querySelectorAll('.faq-item').forEach(el => {
                if(el !== item && el.classList.contains('open')) {
                    el.classList.remove('open');
                    el.querySelector('.faq-content').style.maxHeight = null;
                }
            });

            if (item.classList.contains('open')) {
                item.classList.remove('open');
                content.style.maxHeight = null;
            } else {
                item.classList.add('open');
                content.style.maxHeight = content.scrollHeight + 80 + "px"; 
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            langBtn.innerHTML = currentLang === 'ar' ? '🌐 English' : '🌐 عربي';
            updateUI();
            renderFAQ();
        }

        function toggleConsole() {

                currentConsole = 'ps5';
                document.body.classList.add('theme-ps5');
                badgeElement.className = 'badge-ps5';
            } else {
                currentConsole = 'ps4';
                document.body.classList.remove('theme-ps5');
                badgeElement.className = 'badge-ps4';
            }
            
            updateUI();
            renderFAQ();
        }

        function updateUI() {
            if (currentConsole === 'ps4') {
                consoleBtn.innerHTML = currentLang === 'ar' ? 'التبديل إلى PS5 🔄' : 'Switch to PS5 🔄';
                badgeText.innerHTML = currentLang === 'ar' ? 'الجهاز الحالي: PS4' : 'Current Console: PS4';
            } else {
                consoleBtn.innerHTML = currentLang === 'ar' ? 'التبديل إلى PS4 🔄' : 'Switch to PS4 🔄';
                badgeText.innerHTML = currentLang === 'ar' ? 'الجهاز الحالي: PS5' : 'Current Console: PS5';
            }
        }

        renderFAQ();
    </script>
</body>
</html>
